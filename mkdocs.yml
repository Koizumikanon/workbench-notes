site_name: Workbench Notes
site_description: Practical notes on systems, tools, and engineering workflows.
site_url: https://koizumikanon.github.io/workbench-notes/
repo_url: https://github.com/Koizumikanon/workbench-notes
repo_name: Koizumikanon/workbench-notes

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换为深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 切换为浅色模式

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 首页: index.md
  - 命令手册:
      - 总览: command-recipes/index.md
      - Docker: command-recipes/docker.md
      - MySQL: command-recipes/mysql.md
      - Redis: command-recipes/redis.md
      - Docker MySQL 数据库与用户初始化: command-recipes/docker-mysql-provisioning.md
  - 指南:
      - 硬件维护预检: guides/hardware-maintenance-precheck.md
